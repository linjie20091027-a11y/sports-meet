# ==========================================
# 运动会管理系统 - Docker Compose 一键部署
# 使用: docker compose up -d
# ==========================================

services:
  app:
    build: .
    container_name: sports-meet
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 持久化 SQLite 数据库
      - ./data:/app/data
      # 持久化上传文件
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - DATABASE_URL=file:./data/dev.db
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - sports-net

  # 可选: Nginx 反向代理（如需 HTTPS 和域名）
  # nginx:
  #   image: nginx:alpine
  #   container_name: sports-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - app
  #   networks:
  #     - sports-net

networks:
  sports-net:
    driver: bridge
